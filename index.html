<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👑 FADI KING MD 👑</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-rendering: optimizeLegibility;
        }

        .main-wrapper {
            position: relative;
            padding: 3px;
            border-radius: 25px;
            background: linear-gradient(45deg, #ffcc00, #ff9900, #ff6600, #ff9900, #ffcc00);
            background-size: 400% 400%;
            animation: borderAnimation 5s ease infinite;
            box-shadow: 0 10px 50px rgba(255, 153, 0, 0.4);
        }

        .container {
            text-align: center;
            padding: 60px 50px;
            border-radius: 22px;
            background: #0d0d0d;
            backdrop-filter: blur(5px);
            max-width: 600px;
            width: 90%;
            position: relative;
            overflow: hidden;
        }

        h1 {
            font-size: 4em;
            background: linear-gradient(135deg, #fff 0%, #ffcc00 50%, #ff9900 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(255, 153, 0, 0.7);
            margin-bottom: 25px;
            font-weight: 800;
            letter-spacing: -1px;
            animation: textPulse 1.8s ease-in-out infinite alternate;
        }

        p {
            font-size: 1.3em;
            color: #dcdcdc;
            margin-bottom: 40px;
            line-height: 1.6;
            font-weight: 300;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 18px 40px;
            font-size: 1.2rem;
            color: #000;
            background: linear-gradient(to right, #ffcc00, #ff9900);
            border-radius: 50px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 5px 25px rgba(255, 153, 0, 0.6);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: none;
            outline: none;
        }

        .status-badge:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 12px 35px #ffcc00;
        }

        .status-dot {
            height: 12px;
            width: 12px;
            background-color: #0f0; /* Change to #f00 for offline */
            border-radius: 50%;
            margin-right: 15px;
            display: inline-block;
            box-shadow: 0 0 10px #0f0;
            animation: dotStatus 1.5s ease-in-out infinite;
        }

        /* --- Keyframe Animations --- */
        @keyframes borderAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes textPulse {
            0% { opacity: 0.9; transform: scale(0.98); text-shadow: 0 0 15px rgba(255, 153, 0, 0.5); }
            100% { opacity: 1; transform: scale(1.02); text-shadow: 0 0 30px rgba(255, 153, 0, 0.9); }
        }

        @keyframes dotStatus {
            0% { opacity: 0.4; box-shadow: 0 0 5px #0f0; }
            100% { opacity: 1; box-shadow: 0 0 15px #0f0; }
        }

        /* Particles effect - subtle overlay */
        .container::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(#ffcc001a 1px, transparent 1px), 
                radial-gradient(#ffcc001a 1px, transparent 1px);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px;
            opacity: 0.2;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <div class="container">
            <h1>👑 FADI KING MD 👑</h1>
            <p>Welcome, Muhammad! Your VIP WhatsApp Automation Bot is now online. Manage your chat efficiently with anti-delete and auto-react features.</p>
            <button class="status-badge">
                <span class="status-dot"></span>
                Status: Active
            </button>
        </div>
    </div>
</body>
</html>
